# NotesDesk Server — 本地 / 通用 Docker Compose
# 用法：docker compose up -d --build

services:
  notesdesk:
    build:
      context: .
      dockerfile: Dockerfile
    image: notesdesk-server:latest
    container_name: notesdesk
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 8080
      # 可选：API 访问令牌（Web / API 需 Header: Authorization: Bearer <token>）
      # NOTESDESK_TOKEN: change-me
    volumes:
      - notesdesk-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  notesdesk-data:
    name: notesdesk-data
